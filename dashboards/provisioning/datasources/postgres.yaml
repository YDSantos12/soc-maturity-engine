apiVersion: 1

datasources:
  - name: SOC PostgreSQL
    type: grafana-postgresql-datasource
    uid: soc-postgres
    access: proxy
    url: postgres:5432
    database: socmaturity
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      connMaxLifetime: 14400
    isDefault: true
    editable: false
